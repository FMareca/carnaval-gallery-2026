<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carnaval Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <div class="hero">
            <h1>Carnaval - 2026</h1>
            <p>Fotos tiradas por muita gente e compartilhadas com carinho!</p>
            <a href="#gallery" class="scroll-down">
                <span class="arrow">↓</span>
            </a>
        </div>
    </main>

    <section id="gallery">
        <div class="gallery">
        </div>
    </section>

    <div id="photo-viewer" class="photo-viewer hidden">
        <div class="viewer-content">
            <button class="close-btn">✕</button>
            <img id="viewer-img" src="" alt="">
        </div>
    </div>

    <footer class="footer">
        <p>Feito por Mareca - 2026</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/CustomEase.min.js"></script>
    <script src="js.js"></script>

</body>

</html>
